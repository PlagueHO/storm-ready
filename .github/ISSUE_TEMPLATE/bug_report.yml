name: Bug report
description: Report something that is not working as expected.
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      placeholder: When I ..., StormReady ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: What did you expect to happen?
