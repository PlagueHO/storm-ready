name: ✨ Feature request
description: Suggest a new storm, task, or capability for StormReady.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What would you like to add?
      description: Describe the feature and the player value it delivers.
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Suggested approach
      description: Optional notes on how it might work.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New storm scenario
        - Gameplay / scoring
        - Visuals / animation
        - Accessibility
        - Tooling / developer experience
        - Other
    validations:
      required: true
